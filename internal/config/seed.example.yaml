# Template seed.yaml per hub-cli.
#
# Uso:
#   1. Copia questo file in ~/.hub-cli.seed.yaml
#   2. Personalizza i valori per i tuoi servizi
#   3. Rilancia un qualsiasi comando hub-cli per importarli nel config utente
#
# NOTA: il file ~/.hub-cli.seed.yaml NON va committato — contiene dati
# specifici dell'ambiente (registry, namespace, release name, ecc.).
#
# Formato: stessa struttura di ~/.hub-cli.yaml (sezioni `config` e `services`).
# Ogni servizio ha campi obbligatori (ecr_repository, helm_set_key)
# e campi opzionali documentati di seguito.

# ── Configurazione globale (opzionale) ──────────────────────────────────
# Applicata solo al primo avvio, quando ~/.hub-cli.yaml non esiste ancora.
# Se una chiave è assente, vale il default interno.
config:
  # Account ID AWS del registry ECR (12 cifre)
  ecr_account_id: "000000000000"

  # Regione AWS del registry ECR
  ecr_region: eu-west-1

  # Versione chart di fallback, usata solo se un servizio non ha la sua
  # chart_version. Consigliato impostarla per-servizio anziché qui.
  # chart_version: 0.1.0

  # Contesto kubectl del cluster locale. Se assente, al primo deploy/refresh
  # viene chiesto interattivamente. Impostalo qui per saltare il prompt.
  # local_kube_context: kubernetes-admin@kubernetes

services:
  my-service:
    # Tag iniziale che verrà mostrato come "ultimo deploy"
    last_tag: 1.0.0-dev

    # Path relativo al docker_root_path del Dockerfile del servizio
    dockerfile_subpath: my-service/Dockerfile

    # Path relativo all'helm_root_path del file values usato per il deploy
    helm_values_path: env/values-dev.yaml

    # Namespace Kubernetes target
    namespace: my-namespace

    # Chart Helm da installare (formato: repo/chart)
    chart_name: my-charts/my-app
    chart_version: 0.1.0

    # Nome della release Helm
    release_name: my-app-dev

    # URI ECR completo dell'immagine (registry + repository)
    ecr_repository: 123456789012.dkr.ecr.eu-west-1.amazonaws.com/my-org/my-service

    # Chiave dot-notation nel values.yaml dove scrivere il nuovo tag.
    # Due forme supportate:
    #   - "<path>.tag"   → scrive solo il tag (es. webapp.image.tag)
    #   - "<path>.image" → scrive l'immagine intera "<helm_image_path>:<tag>"
    helm_set_key: myService.image.tag

    # ── Campi opzionali ─────────────────────────────────────────────────
    # Da usare solo se la struttura del chart o del manifest lo richiede.

    # Prefisso immagine quando helm_set_key punta a "<path>.image":
    # il valore scritto sarà "<helm_image_path>:<tag>".
    # helm_image_path: my-org/my-service

    # Path del manifest Kubernetes da aggiornare oltre ai values Helm
    # (usato per commit post-deploy sul repo k8s).
    # k8s_manifest_path: k8s/my-service-deployment.yaml

    # Stringa da cercare nel manifest k8s per individuare l'immagine
    # da aggiornare (tipicamente "<org>/<service>").
    # k8s_image_ref: my-org/my-service

# ── Deploy PSN (Azure AKS + ACR) — opzionale ────────────────────────────
# Configurazione per `hub-cli psn`. Namespace, deployment, repository ACR e
# tag correnti vengono scoperti live dal cluster selezionato: qui servono
# solo i cluster target e il mapping deployment → servizio locale (usato per
# risolvere Dockerfile e build args della build).
# psn:
#   # Tenant Azure (richiesto da `az login`)
#   tenant_id: "00000000-0000-0000-0000-000000000000"
#
#   # Un cluster per ambiente. env: coll | prod — gli ambienti prod
#   # richiedono una conferma extra (digitazione del nome) prima del deploy.
#   clusters:
#     - name: "MYENV — Collaudo"
#       subscription_id: "00000000-0000-0000-0000-000000000000"
#       resource_group: RG-My-Env-AKS
#       aks_name: myaksname001
#       acr_name: myacrname001
#       env: coll
#
#   # Mapping deployment (nome sul cluster PSN) → servizio locale: la build
#   # riusa dockerfile_subpath del servizio indicato. I deployment senza
#   # mapping ricadono sulla ricerca automatica dei Dockerfile.
#   deployments:
#     webapp: my-service
#
#   # Progetti Docker dedicati per-namespace (opzionale): nei namespace che
#   # matchano il pattern, i Dockerfile si risolvono dentro docker_root
#   # (mapping esplicito → convenzione <deployment>/Dockerfile → scansione)
#   # invece che nel docker_root_path globale. branch_coll/branch_prod:
#   # branch git su cui il repo deve trovarsi per quell'ambiente — verificato
#   # prima della build, con proposta di checkout (bloccato se il repo ha
#   # modifiche non committate).
#   projects:
#     - namespace: "legacy-*"
#       docker_root: C:/dev/legacy-project/docker-images
#       branch_coll: develop
#       branch_prod: main
#       deployments:
#         api: api/custom/Dockerfile   # override del path convenzionale
